<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - BI 工具箱</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; min-height: 100vh;
            background: linear-gradient(135deg, #1a1f36 0%, #252b48 50%, #1a1f36 100%);
            display: flex; align-items: center; justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        .login-wrapper { width: 100%; max-width: 420px; padding: 20px; }
        .login-card {
            background: white; border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 48px 40px 40px; position: relative; overflow: hidden;
        }
        .login-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
        }
        .login-brand { text-align: center; margin-bottom: 32px; }
        .login-brand .icon {
            width: 64px; height: 64px; border-radius: 16px; margin: 0 auto 16px;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: white; box-shadow: 0 8px 20px rgba(59,130,246,0.3);
        }
        .login-brand h1 { font-size: 1.4rem; font-weight: 700; color: #1e293b; margin: 0 0 4px; }
        .login-brand p { font-size: 0.85rem; color: #94a3b8; margin: 0; }
        .form-floating { margin-bottom: 16px; }
        .form-floating .form-control {
            border-radius: 10px; border: 2px solid #e2e8f0; padding: 16px 16px 8px 44px; font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        .form-floating .form-control:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        .form-floating label { padding-left: 44px; color: #94a3b8; }
        .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #94a3b8; z-index: 5; font-size: 1.1rem; }
        .btn-login {
            width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600;
            background: linear-gradient(135deg, #3b82f6, #6366f1); color: white;
            transition: all 0.3s; box-shadow: 0 4px 15px rgba(59,130,246,0.3); margin-top: 8px;
        }
        .btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(59,130,246,0.4); }
        .btn-login:active { transform: translateY(0); }
        .alert { border-radius: 10px; border: none; font-size: 0.88rem; }
        .login-footer { text-align: center; margin-top: 24px; font-size: 0.78rem; color: #94a3b8; }
    </style>
</head>
<body>
<div class="login-wrapper d-flex align-items-center justify-content-center" style="min-height:100vh;">
    <div class="login-card">
        <div class="login-brand">
            <div class="icon"><i class="bi bi-bar-chart-line"></i></div>
            <h1>BI 工具箱</h1>
            <p>数据查询 · 定时任务 · 质量监控</p>
        </div>
        {% if form.errors %}
        <div class="alert alert-danger py-2">
            <i class="bi bi-exclamation-circle me-1"></i> 用户名或密码错误，请重试
        </div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div style="position:relative; margin-bottom:16px;">
                <i class="bi bi-person input-icon"></i>
                <input type="text" name="username" class="form-control" style="border-radius:10px;border:2px solid #e2e8f0;padding:14px 16px 14px 44px;font-size:0.95rem;" placeholder="用户名" required autofocus>
            </div>
            <div style="position:relative; margin-bottom:16px;">
                <i class="bi bi-lock input-icon"></i>
                <input type="password" name="password" class="form-control" style="border-radius:10px;border:2px solid #e2e8f0;padding:14px 16px 14px 44px;font-size:0.95rem;" placeholder="密码" required>
            </div>
            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right me-1"></i> 登 录
            </button>
        </form>
        <div class="login-footer">
            <i class="bi bi-shield-check"></i> 安全登录 · 数据加密传输
        </div>
    </div>
</div>
</body>
</html>

{% extends "base.html" %}
{% block title %}修改密码 - BI 工具箱{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card mt-4">
            <div class="card-header bg-white border-bottom-0 pt-4 px-4">
                <h5 class="mb-1"><i class="bi bi-shield-lock"></i> 修改密码</h5>
                <p class="text-muted small mb-0">为保障账户安全，请定期更换密码</p>
            </div>
            <div class="card-body px-4 pb-4">
                {% if messages %}
                {% for msg in messages %}
                <div class="alert alert-{{ msg.tags }} alert-dismissible fade show py-2" role="alert">
                    {% if msg.tags == 'success' %}<i class="bi bi-check-circle me-1"></i>{% else %}<i class="bi bi-exclamation-circle me-1"></i>{% endif %}
                    {{ msg }}
                    <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">当前密码</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                            <input type="password" name="old_password" class="form-control" placeholder="请输入当前密码" required>
                        </div>
                    </div>
                    <hr class="my-3">
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">新密码</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-key"></i></span>
                            <input type="password" name="new_password" class="form-control" placeholder="至少8位，建议包含字母和数字" required minlength="8">
                        </div>
                        <div class="form-text">密码长度不少于8位</div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-semibold">确认新密码</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-key-fill"></i></span>
                            <input type="password" name="confirm_password" class="form-control" placeholder="再次输入新密码" required minlength="8">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="bi bi-check-lg me-1"></i> 确认修改
                    </button>
                </form>
            </div>
        </div>

        <div class="text-center mt-3">
            <small class="text-muted">
                <i class="bi bi-info-circle"></i> 修改密码后需要重新登录
            </small>
        </div>
    </div>
</div>
{% endblock %}
